---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: cve-matter-admission-webhook
webhooks:
  - name: validate.cve-matter.security.io
    clientConfig:
      service:
        name: cve-matter-webhook
        namespace: default
        path: "/validate"
      caBundle: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0tCi0tLS0tRU5EIENFUlRJRklDQVRFLS0tLS0=
    rules:
      - operations: ["CREATE", "UPDATE"]
        apiGroups: ["cve-matter.security.io"]
        apiVersions: ["v1"]
        resources: ["policytriggers"]
    admissionReviewVersions: ["v1", "v1beta1"]
    sideEffects: None
    timeoutSeconds: 5
    failurePolicy: Fail
---
apiVersion: v1
kind: Service
metadata:
  name: cve-matter-webhook
  namespace: default
spec:
  selector:
    app: cve-matter-webhook
  ports:
    - protocol: TCP
      port: 443
      targetPort: 8443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cve-matter-webhook
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cve-matter-webhook
  template:
    metadata:
      labels:
        app: cve-matter-webhook
    spec:
      runtimeClassName: gvisor
      containers:
        - name: webhook
          image: cve-matter-webhook:latest
          ports:
            - containerPort: 8443
          volumeMounts:
            - name: webhook-certs
              mountPath: /etc/webhook/certs
              readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: webhook-certs
