name: CI

on:
  push:
    paths:
      - "aios-layer/**"
  pull_request:
    paths:
      - "aios-layer/**"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aios-layer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go mod download
      - run: make build
      - run: ./scripts/run_checks.sh
      - uses: actions/upload-artifact@v4
        with:
          name: aios-layer-reports
          path: aios-layer/reports
