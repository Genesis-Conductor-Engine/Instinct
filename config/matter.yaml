# CVE Matter-Analysis OS Configuration
# Defense-only vulnerability analysis pipeline

# Operation Mode
mode: cve  # Options: cve, sandbox, audit

# System Identification
system:
  name: "CVE Matter-Analysis OS"
  version: "1.0.0"
  environment: production  # Options: development, staging, production

# NVD Ingestion Configuration
ingest:
  nvd:
    api_url: "https://services.nvd.nist.gov/rest/json/cves/2.0/"
    rate_limit:
      requests_per_30s_without_key: 5
      requests_per_30s_with_key: 50
    retry:
      max_attempts: 3
      backoff_multiplier: 2
      initial_delay_seconds: 1
    checkpoint:
      enabled: true
      file: "data/nvd_checkpoint.json"
    output:
      format: jsonl  # Options: jsonl, json, parquet
      directory: "data/cves"
    sync:
      delta_enabled: true
      full_refresh_interval_days: 30
      default_lookback_days: 7

# Positional Alignment Configuration
alignment:
  # Alignment quality thresholds
  thresholds:
    r2_minimum: 0.85  # Minimum R² for alignment quality
    r2_target: 0.90   # Target R² for optimal alignment
    reregister_threshold: 0.80  # Re-run alignment if below this
  
  # Procrustes alignment
  procrustes:
    enabled: true
    scaling: true  # Allow scaling transformation
    reflection: false  # Disallow reflection
    max_iterations: 100
    convergence_threshold: 1e-6
  
  # Canonical Correlation Analysis (CCA)
  cca:
    enabled: true
    n_components: 10  # Number of canonical components
    regularization: 0.01  # L2 regularization parameter
    max_iterations: 500

# Stacked Arbiter Configuration
arbiter:
  # Multi-objective optimization
  pareto:
    enabled: true
    objectives:
      performance:
        - accuracy
        - f1_score
        - robust_auc_epsilon
      efficiency:
        - latency_ms
        - energy_joules
        - cost_dollars
    knee_detection:
      method: utopian_distance  # Options: utopian_distance, angle_based, normalized_utopian
      prefer_balanced: true
  
  # Base models in ensemble
  models:
    - type: random_forest
      n_estimators: 100
      max_depth: 10
      weight: 1.0
    - type: gradient_boosting
      n_estimators: 50
      learning_rate: 0.1
      weight: 1.0
    - type: logistic_regression
      regularization: l2
      C: 1.0
      weight: 0.8
  
  # Stacking configuration
  stacking:
    meta_learner: logistic_regression
    cv_folds: 5
    use_probabilities: true

# Epsilon-Refractors Configuration
refractors:
  # Distributional shift detection
  epsilon:
    enabled: true
    threshold: 0.05  # Alert threshold for ε
    grid_resolution: 20  # Number of ε values to test
    epsilon_range:
      min: 0.001
      max: 0.5
    metrics:
      - robust_auc_epsilon
      - kl_divergence
      - wasserstein_distance
  
  # Shift detection axes
  shifts:
    temporal: true  # Detect time-based drift
    feature: true   # Detect feature-level shift
    label: true     # Detect label distribution shift
    concept: true   # Detect concept drift
  
  # Risk metrics
  risk:
    cvar_quantile: 0.95  # CVaR at 95% (Conditional Value at Risk)
    var_quantile: 0.95   # VaR at 95% (Value at Risk)

# Bayesian Evidence Configuration
evidence:
  # Evidence calculation methods
  methods:
    primary: WAIC  # Options: BIC, WAIC, DIC
    fallback: BIC
  
  # Bayesian inference
  inference:
    n_samples: 1000  # MCMC samples for evidence calculation
    burn_in: 200     # Burn-in samples
    chains: 4        # Number of MCMC chains
  
  # Evidence interpretation (Jeffreys' scale)
  interpretation:
    bayes_factor_thresholds:
      weak: 3.0       # 1-3: barely worth mentioning
      positive: 10.0  # 3-10: positive evidence
      strong: 30.0    # 10-30: strong evidence
      very_strong: 100.0  # 30-100: very strong evidence
      # >100: decisive evidence
  
  # Prior specifications
  priors:
    type: weakly_informative  # Options: flat, weakly_informative, informative
    beta_alpha: 2.0  # For beta priors
    beta_beta: 2.0

# Orchestration Configuration
orchestration:
  # Pipeline execution
  pipeline:
    max_concurrent_stages: 3
    stage_timeout_minutes: 120
    failure_retry_attempts: 2
    failure_retry_delay_seconds: 60
  
  # H-MOC (Hierarchical Multi-Objective Coordinator)
  hmoc:
    enabled: true
    tensor_macrosegments:
      - spec   # Specification ring
      - tool   # Tool selection ring
      - code   # Code execution ring (GPU workloads)
      - decision  # Decision ring
    
  # Resource management
  resources:
    cpu_limit: 4
    memory_limit_gb: 16
    gpu_enabled: false  # Set to true for GPU acceleration
    gpu_type: "nvidia-tesla-t4"  # Used if gpu_enabled: true

# Logging and Monitoring
logging:
  level: INFO  # Options: DEBUG, INFO, WARN, ERROR, CRITICAL
  format: json  # Options: json, text
  output:
    - stdout
    - file: "logs/matter-analysis.log"
  
  structured:
    include_timestamp: true
    include_hostname: true
    include_pid: true
    include_caller: true

# Monitoring and metrics
monitoring:
  enabled: true
  metrics:
    export_interval_seconds: 60
    endpoints:
      - prometheus
  
  alerting:
    enabled: true
    channels:
      - slack
      - email
    
    rules:
      - name: alignment_quality_low
        condition: "alignment_r2 < 0.85"
        severity: warning
      
      - name: refractor_shift_detected
        condition: "epsilon > 0.05"
        severity: warning
      
      - name: pipeline_failure
        condition: "stage_failed == true"
        severity: critical

# Security and Compliance
security:
  # Defense-only enforcement
  defense_only: true
  
  # Input validation
  validation:
    strict_mode: true
    sanitize_inputs: true
    max_input_size_mb: 100
  
  # Secrets management
  secrets:
    provider: env  # Options: env, gcp_secret_manager, hashicorp_vault
    never_log: true
  
  # Audit logging
  audit:
    enabled: true
    log_all_api_calls: true
    log_file: "logs/audit.log"

# Kubernetes/GKE Runtime
kubernetes:
  namespace: cve-analysis
  
  runtime:
    default_runtime_class: gvisor  # Enhanced isolation
    gpu_runtime_class: nvidia
  
  labels:
    macrosegment_default: spec
    macrosegment_gpu: code
  
  admission_webhook:
    enabled: true
    policies:
      - inject-sleep-init
      - reject-suspicious-binary
      - freeze-image-pull
  
  resources:
    requests:
      cpu: 1
      memory: 2Gi
    limits:
      cpu: 4
      memory: 16Gi

# Argo Workflows
argo:
  enabled: true
  
  workflows:
    epsilon_sweep:
      enabled: true
      schedule: "0 3 * * *"  # Daily at 3 AM UTC
      workflow_template: tensor-macrosegments
      parallelism: 5
      artifact_retention_days: 30
  
  artifacts:
    repository:
      type: gcs  # Options: gcs, s3, minio
      bucket: "cve-analysis-artifacts"
      prefix: "argo-artifacts"

# Terraform/Infrastructure
infrastructure:
  provider: gcp
  
  gcp:
    project_id: "${GCP_PROJECT_ID}"  # From environment
    region: us-central1
    zone: us-central1-a
  
  gke:
    cluster_name: cve-analysis-cluster
    node_pools:
      default:
        machine_type: n1-standard-4
        min_nodes: 1
        max_nodes: 10
      gpu:
        machine_type: n1-standard-4
        accelerator_type: nvidia-tesla-t4
        accelerator_count: 1
        min_nodes: 0
        max_nodes: 3
  
  storage:
    capsules_bucket: cve-capsules
    artifacts_bucket: cve-artifacts
    logs_bucket: cve-logs

# Notion Integration
notion:
  enabled: true
  sync:
    enabled: true
    schedule: "0 */6 * * *"  # Every 6 hours
  
  databases:
    prompts:
      id: "${NOTION_PROMPTS_DB_ID}"  # From environment
      sync_file: "prompts/legendary_lidlift_v14.md"

# Capsule Publishing
capsules:
  enabled: true
  
  publish:
    on_release: true
    on_tag_pattern: "v*"
  
  location:
    type: gcs  # Options: gcs, s3, http
    bucket: cve-capsules
    domain: "https://genesisconductor.io/capsules/"
  
  files:
    - capsules/lidlift-v1.json
    - capsules/hmoc-0.2.json
    - capsules/runbooks.json

# Feature Flags
features:
  cuda_support: false  # Enable GPU acceleration
  distributed_training: false  # Enable distributed ML training
  real_time_analysis: false  # Enable real-time CVE analysis
  webhook_receiver: false  # Enable webhook receiver for external triggers
  experimental_refractors: false  # Enable experimental refractor techniques

# Data Retention
data_retention:
  raw_cves_days: 90
  processed_data_days: 180
  logs_days: 30
  artifacts_days: 60
  checkpoints_days: 30

# Performance Budgets
budgets:
  latency:
    ingest_max_seconds: 300
    alignment_max_seconds: 60
    arbiter_max_seconds: 120
    refractor_max_seconds: 180
    evidence_max_seconds: 60
    total_pipeline_max_seconds: 900
  
  energy:
    max_joules_per_cve: 100
    alert_threshold_joules: 10000
  
  cost:
    max_cost_per_run_dollars: 10.0
    alert_threshold_dollars: 5.0

# Experimental Settings (use with caution)
experimental:
  enabled: false
  
  advanced_refractors:
    dropout_based: false
    adversarial_validation: false
    meta_learning: false
  
  alternative_evidence:
    variational_bayes: false
    laplace_approximation: false

# Configuration schema version
schema_version: "1.0"
last_updated: "2025-11-16"
