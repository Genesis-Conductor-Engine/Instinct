name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Lint with ruff
        run: |
          ruff check cve_matter/ tests/
      
      - name: Format check with black
        run: |
          black --check cve_matter/ tests/
      
      - name: Type check with mypy
        run: |
          mypy cve_matter/ || true
      
      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=cve_matter --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: cpu
          tags: cve-matter-analysis:cpu
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false
      
      - name: Build CUDA image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: cuda
          tags: cve-matter-analysis:cuda
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Test CLI commands
        run: |
          cve-matter --version
          cve-matter --help
          cve-matter ingest --help
          cve-matter align --help
          cve-matter arbiter --help
          cve-matter refract --help
          cve-matter evidence --help
