# CI Workflow for CVE Matter-Analysis OS
#
# This workflow runs linting and unit tests on standard GitHub-hosted runners.
# For heavy jobs (GPU tests, large-scale integration tests), see separate workflows.
#
# Runner Configuration:
# - Standard jobs use ubuntu-latest (GitHub-hosted runner)
# - Heavy jobs should use larger runners per GitHub Actions documentation
# - See: https://docs.github.com/en/enterprise-cloud@latest/actions/using-github-hosted-runners/about-larger-runners

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  # Lint job - runs on standard GitHub-hosted runner
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt || pip install flake8 black mypy
          
      - name: Run flake8
        run: |
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --max-complexity=10 --max-line-length=100 --statistics
        continue-on-error: true
        
      - name: Check formatting with black
        run: |
          black --check --line-length 100 src/
        continue-on-error: true
        
      - name: Type check with mypy
        run: |
          mypy src/ --ignore-missing-imports
        continue-on-error: true

  # Unit tests - runs on standard GitHub-hosted runner
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    strategy:
      matrix:
        python-version: ['3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt yet"
          pip install -r requirements-dev.txt || pip install pytest pytest-cov
          
      - name: Run unit tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing || echo "No tests yet"
        continue-on-error: true
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # Integration tests - runs on standard runner for now
  # TODO: Consider moving to larger runner if tests become compute-intensive
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt yet"
          pip install -r requirements-dev.txt || pip install pytest
          
      - name: Run integration tests
        run: |
          pytest tests/ -v -m integration || echo "No integration tests yet"
        continue-on-error: true

  # Heavy computational tests
  # NOTE: This job should use a larger GitHub-hosted runner when available
  # Update the runs-on label based on your organization's GitHub Actions runner configuration
  # See: https://docs.github.com/en/enterprise-cloud@latest/actions/using-github-hosted-runners/about-larger-runners
  heavy-tests:
    name: Heavy Computational Tests (Large Runner)
    # TODO: Replace with actual large runner label from your org's GitHub Actions configuration
    # Examples from docs: ubuntu-22.04-16core, ubuntu-22.04-64core
    # For now using standard runner as placeholder
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt yet"
          pip install -r requirements-dev.txt || pip install pytest
          
      - name: Run heavy tests (epsilon-sweeps, large-scale alignment)
        run: |
          # These tests may include:
          # - Large-scale alignment tests (10K+ samples)
          # - Epsilon-refractor sweep tests across parameter ranges
          # - Full pipeline integration tests
          pytest tests/ -v -m heavy --timeout=600 || echo "No heavy tests yet"
        continue-on-error: true
        timeout-minutes: 30

  # Validate all JSON and YAML files
  validate-configs:
    name: Validate Configuration Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Validate JSON files
        run: |
          for file in $(find . -name "*.json" -not -path "./node_modules/*" -not -path "./.git/*"); do
            echo "Validating $file..."
            python -m json.tool "$file" > /dev/null || exit 1
          done
          
      - name: Validate YAML files
        run: |
          pip install pyyaml
          python -c "
          import yaml
          import sys
          from pathlib import Path
          
          failed = False
          for file in Path('.').rglob('*.yml'):
              if '.git' not in str(file) and 'node_modules' not in str(file):
                  try:
                      with open(file) as f:
                          yaml.safe_load(f)
                      print(f'✓ {file}')
                  except Exception as e:
                      print(f'✗ {file}: {e}')
                      failed = True
                      
          for file in Path('.').rglob('*.yaml'):
              if '.git' not in str(file) and 'node_modules' not in str(file):
                  try:
                      with open(file) as f:
                          yaml.safe_load(f)
                      print(f'✓ {file}')
                  except Exception as e:
                      print(f'✗ {file}: {e}')
                      failed = True
                      
          sys.exit(1 if failed else 0)
          "

  # Build status check - all jobs must pass
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, validate-configs]
    if: always()
    permissions: {}
    
    steps:
      - name: Check all jobs
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Validate Configs: ${{ needs.validate-configs.result }}"
          
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.validate-configs.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
