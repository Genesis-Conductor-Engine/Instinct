name: Neurohumogenistic Agent CI/CD

on:
  push:
    branches: [main, claude/*]
    paths:
      - 'src/agents/neurohumogenistic/**'
      - 'src/integrations/**'
      - 'workers/pareto-audit/**'
      - 'tests/agents/**'
      - '.github/workflows/neurohumogenistic-ci.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mass_test:
        description: 'Run mass testing suite'
        type: boolean
        default: false
      publish_docs:
        description: 'Publish documentation'
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Python Agent Tests
  # ============================================
  test-python-agent:
    name: Test Python Agent
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.coverage }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"
          pip install pytest pytest-cov pytest-asyncio structlog

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/agents/neurohumogenistic src/integrations

      - name: Type check with mypy
        run: |
          pip install mypy types-requests
          mypy src/agents/neurohumogenistic --ignore-missing-imports || true

      - name: Run unit tests
        run: |
          pytest tests/agents/neurohumogenistic \
            --cov=src/agents/neurohumogenistic \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=test-results.xml \
            -v

      - name: Extract coverage
        id: coverage
        run: |
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); print(f'{float(tree.getroot().attrib[\"line-rate\"]) * 100:.1f}')")
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ============================================
  # Cloudflare Worker Tests
  # ============================================
  test-cloudflare-worker:
    name: Test Pareto-Audit Worker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: workers/pareto-audit/package-lock.json

      - name: Install dependencies
        working-directory: workers/pareto-audit
        run: npm ci

      - name: Type check
        working-directory: workers/pareto-audit
        run: npm run typecheck

      - name: Lint
        working-directory: workers/pareto-audit
        run: npm run lint

      - name: Run tests
        working-directory: workers/pareto-audit
        run: npm test

  # ============================================
  # Integration Tests
  # ============================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-python-agent, test-cloudflare-worker]

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev,test]"
          pip install pytest pytest-asyncio httpx

      - name: Run integration tests
        env:
          REDIS_URL: redis://localhost:6379
          OTEL_CONSOLE_EXPORT: 'true'
        run: |
          pytest tests/integration \
            -v \
            --junitxml=integration-results.xml \
            -m "not slow"

      - name: Upload integration results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results
          path: integration-results.xml

  # ============================================
  # Mass Testing Suite
  # ============================================
  mass-testing:
    name: Mass Testing
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.event.inputs.mass_test == 'true' || github.ref == 'refs/heads/main'

    strategy:
      matrix:
        test-batch: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev,test]"

      - name: Run mass test batch ${{ matrix.test-batch }}
        env:
          TEST_BATCH: ${{ matrix.test-batch }}
          MASS_TEST_ITERATIONS: 100
        run: |
          python tests/mass/run_mass_tests.py \
            --batch ${{ matrix.test-batch }} \
            --iterations $MASS_TEST_ITERATIONS \
            --output-dir mass-results-${{ matrix.test-batch }}

      - name: Upload mass test results
        uses: actions/upload-artifact@v4
        with:
          name: mass-results-batch-${{ matrix.test-batch }}
          path: mass-results-${{ matrix.test-batch }}/

  # ============================================
  # Aggregate Results & Generate Documentation
  # ============================================
  aggregate-results:
    name: Aggregate & Document Results
    runs-on: ubuntu-latest
    needs: [test-python-agent, mass-testing]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install documentation tools
        run: |
          pip install junitparser pandas matplotlib jinja2

      - name: Generate test report
        run: |
          python scripts/generate_test_report.py \
            --artifacts-dir artifacts/ \
            --output-dir docs/test-reports/

      - name: Generate coverage badge
        run: |
          COVERAGE="${{ needs.test-python-agent.outputs.coverage }}"
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          echo "![Coverage](https://img.shields.io/badge/coverage-${COVERAGE}%25-${COLOR})" > docs/test-reports/coverage-badge.md

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: test-documentation
          path: docs/test-reports/

      - name: Publish to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event.inputs.publish_docs == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/test-reports/
          destination_dir: neurohumogenistic-reports

  # ============================================
  # Deploy Cloudflare Worker
  # ============================================
  deploy-worker:
    name: Deploy Pareto-Audit Worker
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: workers/pareto-audit
        run: npm ci

      - name: Deploy to Cloudflare
        working-directory: workers/pareto-audit
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy

  # ============================================
  # Summary Job
  # ============================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test-python-agent, test-cloudflare-worker, integration-tests, aggregate-results]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "## Neurohumogenistic Agent CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python Agent Tests | ${{ needs.test-python-agent.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cloudflare Worker Tests | ${{ needs.test-cloudflare-worker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.aggregate-results.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Coverage:** ${{ needs.test-python-agent.outputs.coverage }}%" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
