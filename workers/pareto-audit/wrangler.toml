# Pareto-Audit Cloudflare Worker
# Deployed to pareto.genesisconductor.io
# Intercepts and filters pipeline opportunities for compliance

name = "pareto-audit"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# HTTP routes
[[routes]]
pattern = "pareto.genesisconductor.io/*"
zone_name = "genesisconductor.io"

[vars]
ARR_FLOOR_USD = "25000"
ROI_TARGET = "10"
MIN_ACV_USD = "100000"
MAX_ACV_USD = "5000000"
SALES_CYCLE_DAYS = "270"

# Local development bindings (for wrangler dev --local)
[[kv_namespaces]]
binding = "AUDIT_CACHE"
id = "local-dev-kv"

[[d1_databases]]
binding = "AUDIT_DB"
database_name = "pareto-audit-local"
database_id = "local-dev-d1"

[observability]
enabled = true

[placement]
mode = "smart"

# NOTE: Staging and production environments require real KV/D1 IDs.
# These are configured via CI secrets and substituted at deploy time.
# See .github/workflows/cross-repo-deploy.yml for the deployment process.
#
# To deploy manually:
# 1. Create KV namespace: wrangler kv:namespace create AUDIT_CACHE
# 2. Create D1 database: wrangler d1 create pareto-audit
# 3. Set the returned IDs in wrangler.toml or use --var flags
