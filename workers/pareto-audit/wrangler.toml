# Pareto-Audit Cloudflare Worker
# Deployed to pareto.genesisconductor.io
# Intercepts and filters pipeline opportunities for compliance

name = "pareto-audit"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ARR_FLOOR_USD = "25000"
ROI_TARGET = "10"
MIN_ACV_USD = "100000"
MAX_ACV_USD = "5000000"
SALES_CYCLE_DAYS = "270"

[triggers]
routes = [
    { pattern = "pareto.genesisconductor.io/*", zone_name = "genesisconductor.io" }
]

[[kv_namespaces]]
binding = "AUDIT_CACHE"
id = "your-kv-namespace-id"

[[d1_databases]]
binding = "AUDIT_DB"
database_name = "pareto-audit"
database_id = "your-d1-database-id"

[observability]
enabled = true

[placement]
mode = "smart"
